<div class="properties-panel">

  <div class="header">
    <h2>Properties</h2>
    <p>Configure selected architecture component</p>
  </div>

  <ng-container *ngIf="editNode; else noSelection">

    <div class="form-section">
      <label>Service Name</label>
      <input type="text" [(ngModel)]="editNode.name" />
    </div>

    <div class="form-section">
      <label>Category</label>
      <select [(ngModel)]="editNode.category">
        <option value="frontend">Frontend</option>
        <option value="backend">Backend</option>
        <option value="database">Database</option>
        <option value="queue">Queue</option>
        <option value="cache">Cache</option>
        <option value="gateway">Gateway</option>
      </select>
    </div>

    <div class="form-section">
      <label>Technology</label>
      <input type="text" [(ngModel)]="editNode.technology"
             placeholder="Spring Boot / MongoDB / Kafka" />
    </div>

    <div class="form-section">
      <label>Scaling Strategy</label>
      <select [(ngModel)]="editNode.scaling">
        <option value="horizontal">Horizontal</option>
        <option value="vertical">Vertical</option>
      </select>
    </div>

    <div class="form-section">
      <label>Description</label>
      <textarea rows="4" [(ngModel)]="editNode.description"></textarea>
    </div>

    <button class="save-btn" (click)="save()">Save Configuration</button>

  </ng-container>

  <ng-template #noSelection>
    <p class="hint">Click a node on the canvas to edit its properties.</p>
  </ng-template>

</div>
